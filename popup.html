<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Study Floss</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="studyfloss-popup-body">
    <main id="studyfloss-popup" aria-label="Study Floss controls">
      <header class="studyfloss-popup-header">
        <div class="studyfloss-brand-block">
          <span class="studyfloss-brand-logo" aria-hidden="true">
            <span class="studyfloss-brand-ring"></span>
            <span class="studyfloss-brand-play"></span>
          </span>
          <div>
            <p class="studyfloss-popup-brand">Study Floss</p>
            <p class="studyfloss-popup-copy">Focus mode for YouTube</p>
          </div>
        </div>
        <label class="studyfloss-switch" title="Toggle Study Mode">
          <input id="study-mode-toggle" type="checkbox">
          <span class="studyfloss-switch-track" aria-hidden="true"></span>
          <span id="study-mode-label" class="studyfloss-switch-label">OFF</span>
        </label>
      </header>

      <!-- LEVEL / XP -->
      <section class="studyfloss-level-card" aria-label="Your level">
        <div class="studyfloss-level-top">
          <div class="studyfloss-level-badge">
            <span id="popup-level-number">1</span>
          </div>
          <div class="studyfloss-level-meta">
            <span id="popup-level-title" class="studyfloss-level-title">Freshman</span>
            <span id="popup-level-xp" class="studyfloss-level-xp">0 / 100 XP</span>
          </div>
          <div class="studyfloss-streak-chip" title="Daily study streak">
            <span class="studyfloss-streak-flame" aria-hidden="true">🔥</span>
            <span id="popup-streak-value">0</span>
          </div>
        </div>
        <div class="studyfloss-xp-track" aria-hidden="true">
          <div id="popup-xp-fill" class="studyfloss-xp-fill"></div>
        </div>
      </section>

      <!-- TIMER HERO -->
      <section class="studyfloss-popup-timer" aria-label="Pomodoro timer">
        <div class="studyfloss-popup-mode-row">
          <span id="popup-mode" class="studyfloss-popup-mode">Focus</span>
          <span id="popup-running" class="studyfloss-popup-running">Paused</span>
        </div>

        <div class="studyfloss-ring-wrap">
          <svg class="studyfloss-ring" viewBox="0 0 120 120" aria-hidden="true">
            <circle class="studyfloss-ring-track" cx="60" cy="60" r="52"></circle>
            <circle id="popup-ring-progress" class="studyfloss-ring-progress" cx="60" cy="60" r="52"
              transform="rotate(-90 60 60)"></circle>
          </svg>
          <div class="studyfloss-ring-center">
            <div id="popup-time" class="studyfloss-popup-time">25:00</div>
            <div id="popup-cycle-dots" class="studyfloss-cycle-dots" aria-label="Pomodoro cycle"></div>
          </div>
        </div>

        <input id="popup-task" class="studyfloss-task-input" type="text" maxlength="80"
          placeholder="What are you working on?" aria-label="Current task">

        <div class="studyfloss-popup-controls">
          <button id="popup-toggle" class="is-primary" type="button">Start</button>
          <button id="popup-reset" type="button">Reset</button>
        </div>

        <div class="studyfloss-popup-mode-controls" role="group" aria-label="Timer mode">
          <button id="popup-study-mode" type="button">Focus</button>
          <button id="popup-break-mode" type="button">Break</button>
        </div>
      </section>

      <!-- STATS GRID -->
      <section class="studyfloss-stat-grid" aria-label="Your stats">
        <div class="studyfloss-stat-card">
          <span class="studyfloss-stat-icon">⏱️</span>
          <span id="popup-stat-today" class="studyfloss-stat-value">0m</span>
          <span class="studyfloss-stat-label">Today</span>
        </div>
        <div class="studyfloss-stat-card">
          <span class="studyfloss-stat-icon">✅</span>
          <span id="popup-stat-sessions" class="studyfloss-stat-value">0</span>
          <span class="studyfloss-stat-label">Sessions</span>
        </div>
        <div class="studyfloss-stat-card">
          <span class="studyfloss-stat-icon">📚</span>
          <span id="popup-stat-total" class="studyfloss-stat-value">0h</span>
          <span class="studyfloss-stat-label">Total focus</span>
        </div>
        <div class="studyfloss-stat-card">
          <span class="studyfloss-stat-icon">🏅</span>
          <span id="popup-stat-best" class="studyfloss-stat-value">0</span>
          <span class="studyfloss-stat-label">Best streak</span>
        </div>
      </section>

      <!-- DAILY GOAL -->
      <section class="studyfloss-goal-card" aria-label="Daily goal">
        <div class="studyfloss-goal-head">
          <span class="studyfloss-section-title">Daily goal</span>
          <span id="popup-goal-summary" class="studyfloss-goal-summary">0 / 120 min</span>
        </div>
        <div class="studyfloss-goal-track" aria-hidden="true">
          <div id="popup-goal-fill" class="studyfloss-goal-fill"></div>
        </div>
        <p id="popup-goal-status" class="studyfloss-goal-status">Start a focus session to make progress.</p>
      </section>

      <!-- WEEKLY CHART -->
      <section class="studyfloss-chart-card" aria-label="This week">
        <div class="studyfloss-goal-head">
          <span class="studyfloss-section-title">This week</span>
          <span id="popup-week-total" class="studyfloss-goal-summary">0h total</span>
        </div>
        <div id="popup-week-chart" class="studyfloss-week-chart"></div>
      </section>

      <!-- ACHIEVEMENTS -->
      <section class="studyfloss-ach-card" aria-label="Achievements">
        <div class="studyfloss-goal-head">
          <span class="studyfloss-section-title">Achievements</span>
          <span id="popup-ach-count" class="studyfloss-goal-summary">0 / 16</span>
        </div>
        <div id="popup-ach-grid" class="studyfloss-ach-grid"></div>
      </section>

      <!-- SETTINGS -->
      <section class="studyfloss-settings" aria-label="Settings">
        <button id="popup-settings-toggle" class="studyfloss-settings-toggle" type="button"
          aria-expanded="false" aria-controls="popup-settings-panel">
          <span>⚙️ Settings</span>
          <span class="studyfloss-settings-chevron" aria-hidden="true">▾</span>
        </button>

        <div id="popup-settings-panel" class="studyfloss-settings-panel" hidden>
          <div class="studyfloss-field-grid">
            <label for="popup-study-minutes">
              Focus (min)
              <input id="popup-study-minutes" type="number" min="1" max="180" step="1">
            </label>
            <label for="popup-break-minutes">
              Break (min)
              <input id="popup-break-minutes" type="number" min="1" max="60" step="1">
            </label>
            <label for="popup-longbreak-minutes">
              Long break (min)
              <input id="popup-longbreak-minutes" type="number" min="5" max="60" step="1">
            </label>
            <label for="popup-cycle-length">
              Long break every
              <input id="popup-cycle-length" type="number" min="2" max="8" step="1">
            </label>
            <label for="popup-goal-minutes">
              Daily goal (min)
              <input id="popup-goal-minutes" type="number" min="10" max="960" step="5">
            </label>
            <label class="studyfloss-field-select" for="popup-theme">
              Theme
              <select id="popup-theme"></select>
            </label>
          </div>

          <label class="studyfloss-field-select" for="popup-ambient">
            Ambient sound (plays on YouTube)
            <select id="popup-ambient"></select>
          </label>

          <label class="studyfloss-toggle-row">
            <span>Auto-start next timer</span>
            <span class="studyfloss-mini-switch">
              <input id="popup-autostart" type="checkbox">
              <span class="studyfloss-mini-track" aria-hidden="true"></span>
            </span>
          </label>

          <label class="studyfloss-toggle-row">
            <span>Completion sound</span>
            <span class="studyfloss-mini-switch">
              <input id="popup-sound" type="checkbox">
              <span class="studyfloss-mini-track" aria-hidden="true"></span>
            </span>
          </label>

          <button id="popup-save-settings" class="studyfloss-save-btn" type="button">Save settings</button>
        </div>
      </section>

      <p id="popup-quote" class="studyfloss-quote"></p>
      <button id="popup-end-session" class="studyfloss-popup-end-session" type="button">End Study Mode</button>
      <p id="popup-status" class="studyfloss-popup-status">Open YouTube to start focusing.</p>
    </main>

    <script src="shared.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
